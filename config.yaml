jira:
  base_url: "https://jira.example.com"
  access_token: ""
  project_filters:
    - name: "default"
      url: "https://jira.example.com/issues/?jql=project%20%3D%20SSD"
  jql: ""
  max_results: 200
  timeout_seconds: 45
  field_mapping:
    issue_type: ""
    severity: ""
    report_department: ""
    root_cause: ""
    frequency: ""
    fail_runtime: ""
    firmware_version: ""
    density: ""
    form_factor: ""
    platform_name: ""
    script_name: ""
    test_step: ""
    expect_result: ""
    actual_result: ""
    activity_comment: ""
    activity_all: ""

confluence:
  base_url: ""
  username: ""
  access_token: ""
  crawl_mode: "space"
  space_keys: []
  root_page_urls: []
  page_limit: 500
  page_size: 50
  timeout_seconds: 45

docs:
  raw_dir: "./data/raw_docs"
  markdown_dir: "./data/markdown"
  chunks_dir: "./data/chunks"
  max_chunk_chars: 1800
  overlap_chars: 200
  marker_min_chars: 300
  supported_extensions: [".pdf", ".pptx", ".xlsx", ".xls", ".docx", ".md"]

retrieval:
  backend: "tantivy"
  index_dir: "./data/retrieval"
  bm25_top_k: 50
  dense_top_k: 50
  fused_top_k: 60
  rerank_top_k: 10
  enable_recency_bias: true
  recency_half_life_days: 30
  source_type_weights:
    jira_issue: 1.35
    jira_issue_analysis: 0.95
    jira_daily_analysis: 0.8
    confluence_page: 1.2
    local_spec: 1.25
    local_md: 1.0

embedding:
  model_name: "sentence-transformers/all-MiniLM-L6-v2"
  batch_size: 16
  device: null

reranker:
  model_name: "BAAI/bge-reranker-base"
  max_length: 512
  device: null

storage:
  database_path: "./data/jira_summary.db"
  output_dir: "./output"

llm:
  base_url: "http://localhost:8000/v1"
  api_key: "dummy"
  model: "qwen3.5-35b"
  timeout_seconds: 120
  default_language: "zh-CN"
  max_output_tokens: 4096
  custom_prompts: {}
  scenario_max_output_tokens:
    daily_report: 4096
    issue_deep_analysis: 6144
    docs_qa: 4096
    jira_docs_qa: 6144
    management_summary: 6144

reporting:
  stale_days: 7
  risk_keywords: ["blocker", "reopen", "panic", "timeout", "data loss", "critical", "stuck"]
  top_issue_limit: 20
  team_filter: null

server:
  host: "0.0.0.0"
  port: 8000
  cors_allow_origins:
    - "http://localhost:3000"
    - "http://127.0.0.1:3000"
  cors_allow_credentials: true
